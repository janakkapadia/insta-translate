name: Update Changelog

on:
  release:
    types: [released]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.release.name }}
          release-notes: ${{ github.event.release.body }}

      - name: Create Pull Request for Changelog
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update CHANGELOG for ${{ github.event.release.name }}"
          title: "docs: update CHANGELOG for ${{ github.event.release.name }}"
          body: "Automated CHANGELOG update for release ${{ github.event.release.name }}."
          branch: "changelog-update-${{ github.event.release.tag_name }}"
          base: main
          delete-branch: true

